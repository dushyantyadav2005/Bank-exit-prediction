<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Bank Exit Prediction</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(120deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .login {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 350px;
        animation: fadeIn 0.6s ease-in-out;
      }

      h1 {
        color: #333;
        margin-bottom: 20px;
      }

      input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.3s;
      }

      input:focus {
        border-color: #4facfe;
        box-shadow: 0 0 5px rgba(79, 172, 254, 0.5);
        outline: none;
      }

      button {
        background: #4facfe;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s;
      }

      button:hover {
        background: #00c6ff;
        transform: scale(1.05);
      }

      h2 {
        margin-top: 20px;
        color: #333;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="login">
      <h1>Bank Exit Prediction</h1>
      <form action="{{ url_for('predict_bank_exit') }}" method="post">
        <input type="text" name="credit" placeholder="Credit Score" required /><br>
        <input type="text" name="geo" placeholder="Location (0:Fr, 1:Sp, 2:De)" required /><br>
        <input type="text" name="gen" placeholder="Gender (0:F, 1:M)" required /><br>
        <input type="text" name="age" placeholder="Age" required /><br>
        <input type="text" name="ten" placeholder="Tenure" required /><br>
        <input type="text" name="bal" placeholder="Balance" required /><br>
        <input type="text" name="prod" placeholder="Number of Products" required /><br>
        <input type="text" name="card" placeholder="Has Credit Card (0 or 1)" required /><br>
        <input type="text" name="act" placeholder="Is Active Member (0 or 1)" required /><br>
        <input type="text" name="salary" placeholder="Estimated Salary" required /><br>
        <button type="submit">Predict</button>
      </form>

      {% if prediction_result %}
        <h2>The Prediction is: {{ prediction_result }}</h2>
      {% endif %}
    </div>
  </body>
</html>
