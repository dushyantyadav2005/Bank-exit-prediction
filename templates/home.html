<html>
<body>
<div class="login">
<h1>Bank Exit Prediction</h1>
<!-- Update the action to point to your new prediction function -->
<form action="{{ url_for('predict_bank_exit')}}" method="post">
    <!-- New input fields based on your Streamlit code -->
    <input type="text" name="credit" placeholder="Credit Score" required="required" /><br>
    <input type="text" name="geo" placeholder="Location (0:Fr, 1:Sp, 2:De)" required="required" /><br>
    <input type="text" name="gen" placeholder="Gender (0:F, 1:M)" required="required" /><br>
    <input type="text" name="age" placeholder="Age" required="required" /><br>
    <input type="text" name="ten" placeholder="Tenure" required="required" /><br>
    <input type="text" name="bal" placeholder="Balance" required="required" /><br>
    <input type="text" name="prod" placeholder="Number of Products" required="required" /><br>
    <input type="text" name="card" placeholder="Has Credit Card (0 or 1)" required="required" /><br>
    <input type="text" name="act" placeholder="Is Active Member (0 or 1)" required="required" /><br>
    <input type="text" name="salary" placeholder="Estimated Salary" required="required" /><br>

    <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>

    <!-- Use a new variable name for the result -->
    <h2>
        The Prediction is: {{prediction_result}}
    </h2>
</form>
</div>
</body>
</html>
